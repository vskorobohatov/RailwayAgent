services:
  redis:
    image: redis:7-alpine
    container_name: railway-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: railway-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - db_data:/app/data
      - reports_data:/app/reports
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: railway-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
  reports_data:
